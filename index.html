<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>WOOWORDGAMEE</title>
    <style>
        :root {
            --bg-color: #FDF5E6;
            --morandi-brown: #A98467;
            --morandi-green: #829356;
            --text-dark: #4F4F4F;
            --pale-bg: rgba(255, 255, 255, 0.85);
        }

        body {
            background-color: var(--bg-color);
            font-family: "PingFang SC", "Helvetica Neue", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        .stats-info { color: var(--text-dark); font-size: 1rem; margin-bottom: 10px; font-weight: bold; display: flex; gap: 20px; }

        .progress-container {
            width: 90%; max-width: 800px; background: #E0E0E0; height: 12px;
            border-radius: 10px; margin-bottom: 20px; overflow: hidden; border: 1px solid #DDE5B6;
        }
        #progress-bar { width: 0%; height: 100%; background: var(--morandi-green); transition: width 0.4s ease; }

        .panel {
            background: var(--pale-bg); padding: 20px; border-radius: 15px; width: 90%;
            max-width: 800px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; z-index: 100;
        }

        textarea { width: 100%; height: 60px; border-radius: 8px; border: 1px solid #ADC178; padding: 10px; box-sizing: border-box; font-size: 14px; margin-bottom: 15px; }

        .controls { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }

        .size-selector button { background: #fff; color: var(--text-dark); border: 1px solid #ccc; padding: 6px 15px; border-radius: 15px; cursor: pointer; font-size: 13px; }
        .size-selector button.active { background: var(--morandi-brown); color: white; border-color: var(--morandi-brown); }

        .main-btn { background: var(--morandi-brown); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        .sync-btn { background: none; border: 1px solid var(--morandi-brown); color: var(--morandi-brown); padding: 5px 12px; border-radius: 15px; cursor: pointer; font-size: 12px; font-weight: bold; }

        .database-win { margin-top: 15px; max-height: 150px; overflow-y: auto; background: #fff; border-radius: 8px; font-size: 13px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #f2f2f2; }
        th { background: #F8F9FA; position: sticky; top: 0; }
        .count-badge { background: #E8F5E9; color: #2E7D32; padding: 2px 8px; border-radius: 10px; font-weight: bold; font-size: 11px; }
        .del-x { color: #ccc; cursor: pointer; margin-left: 10px; }

        #game-board {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 1.5vw;
            width: 98%; max-width: 1400px; margin-top: 20px; position: relative;
        }

        .game-item {
            flex: 0 1 calc((100% / var(--item-count)) - 2vw);
            min-width: 130px; max-width: 280px; display: flex; justify-content: center; align-items: center;
        }

        /* --- 修正后的泡泡样式 --- */
        .bubble {
            width: 90%; aspect-ratio: 1 / 1; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-dark); font-weight: 900; cursor: pointer;
            text-align: center; user-select: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            padding: 8px; box-sizing: border-box;
            
            /* 强制不换行核心代码 */
            white-space: nowrap;      /* 禁止换行 */
            overflow: visible;        /* 允许字母稍微超出圆圈一点点，总比换行好看 */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .bubble.selected { transform: scale(1.08); box-shadow: 0 0 25px var(--morandi-brown); border: 4px solid #fff; z-index: 10; }
        .hidden-bubble { transform: scale(0); opacity: 0; pointer-events: none; }

        #connection-svg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .connection-line { stroke: rgba(169, 132, 103, 0.5); stroke-width: 6; stroke-linecap: round; fill: none; }

        #success-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal { background: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.3); max-width: 400px; width: 80%; }
    </style>
</head>
<body>

    <h1>WOOWORDGAMEE</h1>

    <div class="stats-info">
        <div>词库总量: <span id="total-words">0</span></div>
        <div>当前进度: <span id="learned-words">0</span> / <span id="total-words-repeat">0</span></div>
    </div>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div class="panel">
        <textarea id="word-input" placeholder="输入单词（如：extraordinary 超凡的）..."></textarea>
        <div class="controls">
            <div class="size-selector" id="size-btns">
                <span>每轮数量：</span>
                <button data-size="5" class="active">5</button>
                <button data-size="10">10</button>
                <button data-size="20">20</button>
            </div>
            <button class="main-btn" id="add-btn">存入资料库</button>
            <button class="main-btn" id="start-game-btn" style="background:#829356">开始/继续挑战</button>
        </div>

        <div class="database-win">
            <table>
                <thead><tr><th>英文</th><th>中文</th><th>添加日期</th><th>学习次数</th></tr></thead>
                <tbody id="db-body"></tbody>
            </table>
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
            <div>
                <button class="sync-btn" id="export-btn">📤 导出词库</button>
                <button class="sync-btn" id="import-btn">📥 导入词库</button>
            </div>
            <button id="clear-db" style="background:none; border:none; color:#999; cursor:pointer; font-size:11px;">清空所有数据</button>
        </div>
    </div>

    <svg id="connection-svg"></svg>
    <div id="game-board"></div>

    <div id="success-layer">
        <div class="modal">
            <h2 id="modal-title">🏆 功德圆满！</h2>
            <p id="modal-msg">你已经学完了所有单词。</p>
            <button class="main-btn" id="restart-all-btn" style="background:#829356">从头复习</button>
            <button class="main-btn" id="close-modal" style="background:#bbb; margin-top:10px;">暂时关闭</button>
        </div>
    </div>

    <script>
        // 使用 v7 存储
        let database = JSON.parse(localStorage.getItem('word_db_v7')) || [];
        let startIndex = 0;
        let currentSize = 5;
        let firstSelection = null;
        let matchedCount = 0;

        const morandiPales = ['#F0E5E1', '#E8E1E1', '#E7DFD5', '#DBE4E5', '#DDE4DD', '#E4DED3'];
        const board = document.getElementById('game-board');
        const dbBody = document.getElementById('db-body');
        const progressBar = document.getElementById('progress-bar');
        const successLayer = document.getElementById('success-layer');

        function updateUI() {
            dbBody.innerHTML = '';
            database.forEach((item, index) => {
                const isCurrent = (index >= startIndex && index < startIndex + currentSize);
                dbBody.insertAdjacentHTML('beforeend', `
                    <tr style="${isCurrent ? 'background:#FFF9C4; font-weight:bold;' : ''}">
                        <td>${item.en}</td>
                        <td>${item.zh}</td>
                        <td style="color:#999; font-size:11px;">${item.date}</td>
                        <td><span class="count-badge">${item.count || 0} 次</span><span class="del-x" onclick="deleteWord(${index})">✕</span></td>
                    </tr>
                `);
            });
            const total = database.length;
            document.getElementById('total-words').innerText = total;
            document.getElementById('total-words-repeat').innerText = total;
            document.getElementById('learned-words').innerText = Math.min(startIndex, total);
            localStorage.setItem('word_db_v7', JSON.stringify(database));
            progressBar.style.width = (total === 0 ? 0 : (startIndex / total) * 100) + '%';
        }

        // 同步功能
        document.getElementById('export-btn').onclick = () => {
            const encodedData = btoa(encodeURIComponent(JSON.stringify(database))); 
            window.prompt("请复制：", encodedData);
        };
        document.getElementById('import-btn').onclick = () => {
            const code = window.prompt("请粘贴：");
            if (code) {
                try {
                    database = JSON.parse(decodeURIComponent(atob(code)));
                    startIndex = 0; updateUI();
                } catch (e) { alert("导入失败"); }
            }
        };

        function addWords() {
            const text = document.getElementById('word-input').value.trim();
            if (text) {
                const tokens = text.split(/\s+/);
                const date = new Date().toLocaleDateString();
                for (let i = 0; i < tokens.length; i += 2) {
                    if (tokens[i] && tokens[i+1]) { database.push({ en: tokens[i], zh: tokens[i+1], date: date, count: 0 }); }
                }
                document.getElementById('word-input').value = ''; updateUI();
            }
        }

        window.deleteWord = (i) => { if(confirm("确定删除？")) { database.splice(i, 1); updateUI(); } };

        function initGame() {
            clearLines(); board.innerHTML = ''; successLayer.style.display = 'none';
            matchedCount = 0; firstSelection = null;
            let gameWords = database.slice(startIndex, startIndex + currentSize);
            if (database.length === 0) { board.innerHTML = "请录入单词。"; return; }
            if (gameWords.length === 0) {
                if(startIndex >= database.length && database.length > 0) { successLayer.style.display = 'flex'; return; }
                else { startIndex = 0; initGame(); return; }
            }

            // 动态字体大小基准
            let baseFontSize = (currentSize <= 5) ? 1.8 : (currentSize <= 10 ? 1.5 : 1.2);
            board.style.setProperty('--item-count', currentSize);

            let items = [];
            gameWords.forEach((p, idx) => {
                const realIndex = startIndex + idx;
                items.push({ text: p.en, match: p.zh, dbIndex: realIndex });
                items.push({ text: p.zh, match: p.en, dbIndex: realIndex });
            });
            items.sort(() => Math.random() - 0.5);

            items.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'game-item';
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.innerText = item.text;
                bubble.style.backgroundColor = morandiPales[Math.floor(Math.random() * morandiPales.length)];
                
                // 👈 改进的字体缩放算法：让长单词更小，且绝不换行
                let finalFontSize = baseFontSize;
                if(item.text.length > 10) finalFontSize *= 0.6;
                else if(item.text.length > 6) finalFontSize *= 0.8;
                bubble.style.fontSize = finalFontSize + "rem";

                bubble.onclick = () => handleSelect(bubble, item, items.length);
                itemDiv.appendChild(bubble);
                board.appendChild(itemDiv);
            });
            updateUI();
        }

        function handleSelect(el, data, total) {
            if (el.classList.contains('hidden-bubble')) return;
            if (!firstSelection) {
                firstSelection = { el, data }; el.classList.add('selected');
            } else if (firstSelection.el === el) {
                el.classList.remove('selected'); firstSelection = null;
            } else {
                drawLine(firstSelection.el, el);
                if (firstSelection.data.match === data.text) {
                    database[data.dbIndex].count = (database[data.dbIndex].count || 0) + 1;
                    setTimeout(() => {
                        el.classList.add('hidden-bubble'); firstSelection.el.classList.add('hidden-bubble');
                        firstSelection = null; clearLines(); matchedCount += 2; updateUI();
                        if (matchedCount === total) {
                            startIndex += currentSize; 
                            setTimeout(() => { initGame(); }, 800);
                        }
                    }, 150);
                } else {
                    setTimeout(() => { firstSelection.el.classList.remove('selected'); firstSelection = null; clearLines(); }, 250);
                }
            }
        }

        function drawLine(e1, e2) {
            clearLines();
            const r1 = e1.getBoundingClientRect(); const r2 = e2.getBoundingClientRect();
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("x1", r1.left + r1.width/2); l.setAttribute("y1", r1.top + r1.height/2);
            l.setAttribute("x2", r2.left + r2.width/2); l.setAttribute("y2", r2.top + r2.height/2);
            l.setAttribute("class", "connection-line");
            document.getElementById('connection-svg').appendChild(l);
        }
        function clearLines() { document.getElementById('connection-svg').innerHTML = ''; }

        document.getElementById('add-btn').onclick = addWords;
        document.getElementById('start-game-btn').onclick = initGame;
        document.getElementById('restart-all-btn').onclick = () => { startIndex = 0; initGame(); };
        document.getElementById('size-btns').onclick = (e) => {
            if (e.target.tagName === 'BUTTON') {
                document.querySelectorAll('#size-btns button').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentSize = parseInt(e.target.dataset.size);
            }
        };
        document.getElementById('clear-db').onclick = () => { if(confirm("确定清空？")) { database=[]; startIndex=0; updateUI(); } };
        updateUI();
    </script>
</body>
</html>
